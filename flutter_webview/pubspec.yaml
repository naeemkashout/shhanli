name: shipme_mobile
description: A Flutter mobile app for the ShipMe backend, targeting Android and iOS.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"
dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  shared_preferences: ^2.1.0
  image_picker: ^0.8.7+5
  mime: ^1.0.4
  path: ^1.8.4
  http_parser: ^4.1.0
  webview_flutter: ^4.2.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
flutter:
  uses-material-design: true
